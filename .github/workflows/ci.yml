name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "bug/**"
      - "feat/**"
      - "fix/**"

jobs:
  python:
    name: Python lint and tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt ruff

      - name: Lint
        run: ruff check app.py prizm_client.py cache_manager_new.py test_prizm_api.py

      - name: Test
        run: python -m unittest test_prizm_api.py

  node:
    name: Node tests and build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test -- --runInBand

      - name: Build
        run: npm run build

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs:
      - python
      - node

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t prizm-api:ci .
